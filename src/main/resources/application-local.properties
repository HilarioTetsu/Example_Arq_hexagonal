spring.config.activate.on-profile=local

# Conexión apuntando al contenedor de LocalStack dentro de la red de Docker
spring.datasource.url=jdbc:postgresql://localstack:4510/activos_db
spring.datasource.username=db_admin_local
spring.datasource.password=super_secret_pass_local
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate para desarrollo
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true